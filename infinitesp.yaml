# InfinitESP - Carrier Infinity / Bryant Evolution ABCD bus SAM emulator
#
# This is a reference configuration. Copy it, modify it for your hardware,
# and flash to your ESP32.
#
# Requirements:
#   - An ESP32 (recommended) or ESP8266 with an RS485 transceiver
#   - Carrier Infinity / Bryant Evolution HVAC system with ABCD bus
#   - secrets.yaml in this directory with:
#       ssid: "YourWiFiNetwork"
#       password: "YourWiFiPassword"
#
# The Waveshare ESP32-S3-Relay-6CH is used as the example board because it
# has an onboard RS485 transceiver. Any ESP32-S3 works - just change the
# UART pins.

substitutions:
  name: infinitesp
  friendly_name: InfinitESP

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  project:
    name: infinitesp.esp32-s3-relay-6ch
    version: 0.1.0

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended

# ──────────────────────────────────────────────
# Core services
# ──────────────────────────────────────────────

logger:
  baud_rate: 0  # Free up UART0; logs available via WiFi/USB only

api:
  # max_connections: 16  # Increase if using esphome logs frequently

ota:
  - platform: esphome

wifi:
  # InfinitESP can autodiscover WiFi credentials from the thermostat's bus
  # register 0x4608 and cache them to NVS flash. If the ESP32 later boots
  # without connectivity, it injects the cached creds after a 15-second
  # grace period. No manual config needed.
  # (Experimental, hardware UART only - TCP client has a circular dependency.)
  networks:
    - ssid: !secret ssid
      password: !secret password
  ap: {}  # Fallback captive portal if WiFi fails

captive_portal:

time:
  - platform: homeassistant
    id: homeassistant_time

# ──────────────────────────────────────────────
# External components
# ──────────────────────────────────────────────

external_components:
  - source:
      type: git
      url: https://github.com/nebulous/esphome-uart-link
  - source:
      type: local
      path: components

# ──────────────────────────────────────────────
# UART - Carrier ABCD RS485 bus
# ──────────────────────────────────────────────
# The ABCD bus runs at 38400 baud, 8N1. Connect TX/RX to your RS485
# transceiver. Three transport options are shown below - uncomment
# the one that matches your setup and comment out the others.
# ──────────────────────────────────────────────

# --- Option A: Hardware UART (simplest, recommended) ---
uart:
  id: bus_uart
  tx_pin: GPIO17
  rx_pin: GPIO18
  baud_rate: 38400
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 4096

# --- Option B: USB CDC ACM (TinyUSB virtual serial) ---
# For when the ESP32 connects to the bus indirectly via a USB-to-serial
# adapter on a separate host machine. Requires esp-idf framework.
#
# tinyusb:
#
# usb_cdc_acm:
#   rx_buffer_size: 4096
#   tx_buffer_size: 1024
#   interfaces:
#     - id: bus_cdcuart

# --- Option C: TCP serial client ---
# Connects to a remote TCP serial bridge (socat, ser2net, etc.).
# Useful for development when the RS485 dongle is on a different machine.
#
# uart_tcp_client:
#   id: bus_tcpuart
#   host: "192.168.1.23"
#   port: 23
#   rx_buffer_size: 4096
#   reconnect_interval: 5s

# --- SAM ASCII protocol server ---
# A text interface to the bus, enabled by default. Works in passive mode too —
# no SAM emulation required. Connect interactively with telnet/netcat:
#   nc infinitesp.local 23
# then type commands like REPORT?, MODE?, Z1RT? (see the SAM ASCII section of
# the README). To grab a diagnostic snapshot as a clean JSON file, run:
#   python3 -c "import socket;s=socket.create_connection(('infinitesp.local',23),5);s.sendall(b'REPORT?\r\n');open('report.json','wb').write(next(l for l in s.makefile('rb') if l.startswith(b'{')))"
# (Use `python` instead of `python3` on Windows.) See Reporting Issues in the
# README for what to include and a note on device serials in the output.
#
# Backed by a uart_tcp_server. Comment this block out to disable the server.
uart_tcp_server:
  - id: ascii_uart
    port: 23
    max_clients: 4
    client_mode: fanout
    idle_timeout: 300s

sam_ascii:
  id: sam_ascii_server
  infinitesp_id: infinitesp_hub
  uart_id: ascii_uart

# --- Optional: Raw bus monitor via TCP ---
# Mirrors ABCD traffic to a TCP port for external tools:
#   nc infinitesp.local 4242
#
# The bridge owns the hardware UART and fans bytes to both InfinitESP
# and the TCP tap. InfinitESP must read from the bridge, not bus_uart.
#
# uart_tcp_server:
#   - id: raw_bus_tap
#     port: 4242
#     max_clients: 2
#     client_mode: fanout
#     idle_timeout: 30s
#
# uart_bridge:
#   id: bus_bridge
#   uarts:
#     - bus_uart                                           # hardware RS485
#     - uart: raw_bus_tap
#       flow: from_bridge  # monitor-only; change to 'both' to allow TCP writes
#
# Then change uart_id in infinitesp: from bus_uart to bus_bridge.

# ──────────────────────────────────────────────
# InfinitESP hub
# ──────────────────────────────────────────────

# SAM and zone-controller emulation are independent and each gated on its
# address being nonzero. Set sam_address to enable SAM emulation (climate,
# selects, holds, system mode). Set zone_controller_address to EMULATE a zone
# controller at 0x60 (lets you inject external zone temp sensors and actuate
# dampers). Leave either at 0 to only snoop the bus without emulating that
# device: with zone_controller_address at 0, InfinitESP still passively
# monitors a real physical ZC already on the bus. Damper covers and per-zone
# climate heating/cooling action then reflect the real damper state.
#
# WARNING: ZC EMULATION REQUIRES REAL DAMPERS. When the thermostat commissions
# a zone it runs a duct checkout that maps damper position to airflow by
# reading the indoor unit's fan telemetry. That only converges with real
# dampers that change duct static pressure. An emulated ZC reports damper
# position on the bus but produces no airflow change UNLESS you wire real
# dampers to the cover on_change trigger so they actually move. With no
# dampers on the trigger the checkout never validates. It runs at install AND
# as a recurring daily checkout, and it STOPS ALL HEATING AND COOLING while it
# runs, potentially indefinitely until resolved. This is inherent to emulation,
# not fixable in firmware. Emulate only on a system with real dampers/ductwork
# (wired to on_change). To add a temp sensor to an existing zoned system, leave
# this at 0 and passively monitor the real hardware.
infinitesp:
  id: infinitesp_hub
  uart_id: bus_uart           # Change to bus_cdcuart or bus_tcpuart if using those
  sam_address: 0x92               # Nonzero = SAM emulation active. 0x92 = SAM, 0x93 = FakeSAM (test), 0 = passive
  zone_controller_address: 0x60   # Nonzero = emulate ZC at 0x60. 0 = no emulation (still passively monitors a real ZC if present)
  # flow_control_pin: GPIO13   # RS485 DE/RE control (needed for some transceivers)
  # status_light_id: rgb_led  # Status LED reference (see light: section below)

  # Feed external ESPHome sensors into the emulated ZC's register 0302. Zone
  # temps use zc_zone_2/3/4 (primary controller 0x60; stale → fall back to
  # zone-1 ambient) or zc_zone_5-8 (secondary controller 0x61, for systems
  # commissioned with more than four zones). The LAT/HPT thermistor ports
  # (zc_lat / zc_hpt) report the fed value while fresh and revert to
  # not-installed when the sensor goes stale — there is no ambient fallback
  # for supply-air temp. Only meaningful when emulating the ZC.
  # Requires an external sensor reporting °F or °C; set sensor_unit to match.
  # zc_lat:
  #   temperature_sensor: my_lat_sensor
  #   sensor_unit: F
  #   staleness_timeout: 120
  # zc_hpt:
  #   temperature_sensor: my_hpt_sensor
  #   sensor_unit: F

# ──────────────────────────────────────────────
# Climate zones
# ──────────────────────────────────────────────
# Uncomment one entry per active zone (1–8). The Infinity system supports
# up to 8 zones; most installations have 1–3.
# ──────────────────────────────────────────────

climate:
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Zone 1 Climate"
    zone: 1
  # - platform: infinitesp
  #   infinitesp_id: infinitesp_hub
  #   name: "Zone 2 Climate"
  #   zone: 2

# ──────────────────────────────────────────────
# Damper covers (zone-controller emulation OR physical ZC)
# ──────────────────────────────────────────────
# Reports each zone's commanded damper position (0–100%) from the bus. Works
# two ways: set zone_controller_address above to EMULATE a ZC (0x60), OR leave
# it at 0 and InfinitESP will passively SNOOP the thermostat's damper writes to
# a real physical zone controller already on the bus. Either way the cover and
# the per-zone climate heating/cooling action reflect real damper state. With
# no ZC of any kind these covers never publish (unknown).
# Add one entry per active zone (1–8). Without an on_change trigger the cover
# is read-only.
# ──────────────────────────────────────────────

cover:
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Zone 1 Damper"
    zone: 1
    device_class: damper
  # - platform: infinitesp
  #   infinitesp_id: infinitesp_hub
  #   name: "Zone 2 Damper"
  #   zone: 2
  #   device_class: damper

# Optional on_change: fires whenever the cover's reported position doesn't
# match the commanded position (from the thermostat bus or from Home
# Assistant), passing the new 0.0–1.0 position as `pos`.
# The cover never writes the bus, so what the action does (log, drive relays,
# toggle GPIO) is up to you. This example just logs it.
#
# cover:
#   - platform: infinitesp
#     infinitesp_id: infinitesp_hub
#     name: "Zone 1 Damper"
#     zone: 1
#     device_class: damper
#     on_change:
#       then:
#         - logger.log:
#             format: "Damper: %.0f%%"
#             args: [ 'pos * 100.0' ]

# ──────────────────────────────────────────────
# Sensors
# ──────────────────────────────────────────────

sensor:
  # Zone environment - add temperature + humidity for each active zone
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Zone 1 Temperature"
    type: temperature
    zone: 1
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Zone 1 Humidity"
    type: humidity
    zone: 1

  # Outdoor temperature
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Outdoor Temperature"
    type: outdoor_temperature

  # Zone board thermistor ports (register 0302, ids 0x14/0x1C). Only populated
  # by a real Zone Controller with LAT/HPT thermistors wired; disabled by
  # default — enable in Home Assistant if your board reports them.
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Leaving Air Temperature"
    type: zc_lat
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "HPT Temperature"
    type: zc_hpt

  # Indoor unit diagnostics (passively snooped from bus traffic)
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Blower RPM"
    type: blower_rpm
    icon: "mdi:fan"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Airflow CFM"
    type: airflow_cfm
    icon: "mdi:air-filter"
    entity_category: diagnostic

  # Outdoor unit - compressor, passively snooped (target=commanded, actual=measured)
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Target Compressor RPM"
    type: target_compressor_rpm
    icon: "mdi:engine"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Compressor RPM"
    type: compressor_rpm
    icon: "mdi:engine"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Compressor Frequency"
    type: compressor_frequency
    icon: "mdi:sine-wave"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Expansion Valve"
    type: odu_expansion_valve
    accuracy_decimals: 0
    icon: "mdi:valve"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Commanded Stage"
    type: odu_commanded_stage
    icon: "mdi:transmission-tower"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Stage"
    type: odu_stage
    icon: "mdi:step-forward"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Operating Mode"
    type: odu_mode
    icon: "mdi:briefcase-edit"
    entity_category: diagnostic

  # Outdoor unit - superheat / subcooling (float registers)
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Superheat Target"
    type: odu_float_1
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Superheat Actual"
    type: odu_float_2
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Subcooling Target"
    type: odu_float_3
    accuracy_decimals: 1
    icon: "mdi:thermometer-chevron-down"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Subcooling Actual"
    type: odu_float_4
    accuracy_decimals: 1
    icon: "mdi:thermometer-chevron-down"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Float 5"
    type: odu_float_5
    accuracy_decimals: 1
    icon: "mdi:thermometer-alert"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Float 6"
    type: odu_float_6
    accuracy_decimals: 3
    icon: "mdi:blur"
    entity_category: diagnostic

  # Outdoor unit - temperatures
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Outdoor Temp"
    type: odu_outdoor_temp
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Coil Temp"
    type: odu_coil_temp
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Suction Temp"
    type: odu_suction_temp
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Suction Superheat"
    type: odu_suction_superheat
    accuracy_decimals: 1
    icon: "mdi:thermometer-lines"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Discharge Temp"
    type: odu_discharge_temp
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    entity_category: diagnostic

  # Vacation limits
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Vacation Min Temp"
    type: vacation_min_temp
    icon: "mdi:thermometer-low"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Vacation Max Temp"
    type: vacation_max_temp
    icon: "mdi:thermometer-high"
    entity_category: diagnostic

  # WiFi
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

# ──────────────────────────────────────────────
# Binary sensors
# ──────────────────────────────────────────────

binary_sensor:
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Bus Status"
    type: bus_status
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Compressor Running"
    type: compressor_running
    icon: "mdi:engine"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Electric Heat"
    type: electric_heat
    icon: "mdi:fire"
    entity_category: diagnostic
  - platform: status
    name: "Status"

  # Boot button (available on most ESP32 dev boards)
  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Boot Button"
    entity_category: diagnostic

# ──────────────────────────────────────────────
# Selects
# ──────────────────────────────────────────────

select:
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "System Mode"
    type: system_mode
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Zone 1 Fan Mode"
    type: fan_mode
    zone: 1

# ──────────────────────────────────────────────
# Text sensors
# ──────────────────────────────────────────────

text_sensor:
  # Zone info - add zone_name for each active zone
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Zone 1 Name"
    type: zone_name
    zone: 1
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Zone 1 Hold State"
    type: hold_state
    zone: 1

  # Fault history (polled every ~31s)
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Fault History"
    type: fault_history
    icon: "mdi:alert-circle-outline"
    entity_category: diagnostic

  # Comfort profiles (home/away/sleep/wake setpoints + fan)
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Comfort Profiles"
    type: comfort_profile
    icon: "mdi:thermostat"
    entity_category: diagnostic

  # Thermostat network info
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Thermostat WiFi SSID"
    type: tstat_ssid
    icon: "mdi:wifi"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Thermostat Hostname"
    type: tstat_hostname
    icon: "mdi:network"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Thermostat WiFi MAC"
    type: tstat_wifi_mac
    icon: "mdi:identifier"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Thermostat Cloud Host"
    type: tstat_cloud_host
    icon: "mdi:cloud-outline"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Thermostat Proxy Server"
    type: tstat_proxy_server
    icon: "mdi:ip-network"
    entity_category: diagnostic

  # Dealer info
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Dealer Name"
    type: tstat_dealer_name
    icon: "mdi:account-hard-hat"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Dealer Brand"
    type: tstat_dealer_brand
    icon: "mdi:tag"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Dealer URL"
    type: tstat_dealer_url
    icon: "mdi:web"
    entity_category: diagnostic

  # WiFi
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic

# ──────────────────────────────────────────────
# Board hardware - OPTIONAL
# ──────────────────────────────────────────────
# The following section is specific to the Waveshare ESP32-S3-Relay-6CH.
# Remove or replace it if using a different board. The infinitesp component
# itself only needs UART + power - relays, LEDs, and buzzers are extras.
# ──────────────────────────────────────────────

# # Relays (Waveshare 6CH)
# switch:
#   - platform: gpio
#     pin: GPIO1
#     name: "Relay 1"
#   - platform: gpio
#     pin: GPIO2
#     name: "Relay 2"
#   - platform: gpio
#     pin: GPIO41
#     name: "Relay 3"
#   - platform: gpio
#     pin: GPIO42
#     name: "Relay 4"
#   - platform: gpio
#     pin:
#       number: GPIO45
#       ignore_strapping_warning: true
#     name: "Relay 5"
#   - platform: gpio
#     pin:
#       number: GPIO46
#       ignore_strapping_warning: true
#     name: "Relay 6"

# # RGB LED (Waveshare 6CH has a WS2812 on GPIO38)
# light:
#   - platform: esp32_rmt_led_strip
#     id: rgb_led
#     name: "RGB LED"
#     rgb_order: RGB
#     pin: GPIO38
#     num_leds: 1
#     chipset: WS2812

# # Buzzer (Waveshare 6CH has a piezo on GPIO21)
# output:
#   - platform: ledc
#     pin: GPIO21
#     id: buzzer
#
# rtttl:
#   output: buzzer
#   id: rtttl_buzzer
#   gain: 30%

button:
  - platform: restart
    name: "Restart"
    entity_category: config
  - platform: safe_mode
    name: "Safe Mode"
    entity_category: config

