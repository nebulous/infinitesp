# InfinitESP — Carrier Infinity / Bryant Evolution ABCD bus SAM emulator
#
# Tested on the Waveshare ESP32-S3-Relay-6CH (onboard RS485, 6 relays, RGB LED, buzzer).
# Works with any ESP32-S3 + RS485 transceiver — just change the UART pins.
#
# Before flashing, create secrets.yaml in this directory:
#   ssid: "YourWiFiNetwork"
#   password: "YourWiFiPassword"

substitutions:
  name: infinitesp
  friendly_name: InfinitESP

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  project:
    name: infinitesp.esp32-s3-relay-6ch
    version: 0.1.0

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended

# ──────────────────────────────────────────────
# Core services
# ──────────────────────────────────────────────

logger:
  baud_rate: 0  # Free up UART0; logs available via WiFi/USB only

api:
  max_connections: 4

ota:
  - platform: esphome

wifi:
  # InfinitESP can autodiscover WiFi credentials from the thermostat's bus register
  # and cache them to NVS flash. If the ESP32 later boots without connectivity, it
  # injects the cached creds after a 15-second grace period — no manual config needed.
  # (Experimental, hardware UART only — TCP client has a circular dependency.)
  networks:
    - ssid: !secret ssid
      password: !secret password
  ap: {}  # Fallback captive portal if WiFi fails

captive_portal:

# web_server:
#   port: 80

time:
  - platform: homeassistant
    id: homeassistant_time

# ──────────────────────────────────────────────
# External components
# ──────────────────────────────────────────────

external_components:
  - source:
      type: git
      url: https://github.com/nebulous/esphome-uart-link
  - source:
      type: local
      path: components

# ──────────────────────────────────────────────
# UART — Carrier ABCD RS485 bus
# ──────────────────────────────────────────────

# Hardware UART (Waveshare onboard RS485, auto-direction — no DE/RE pin needed)
uart:
  id: bus_uart
  tx_pin: GPIO17
  rx_pin: GPIO18
  baud_rate: 38400
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 4096

# --- Alternative: USB CDC ACM (TinyUSB virtual serial) ---
# For when the ESP32 connects to the bus indirectly via a USB-to-serial
# adapter on a separate host machine.
#
# tinyusb:
#
# usb_cdc_acm:
#   rx_buffer_size: 4096
#   tx_buffer_size: 1024
#   interfaces:
#     - id: bus_cdcuart

# --- Alternative: TCP serial client ---
# Connects to a remote TCP serial bridge (socat, ser2net, etc.).
#
# uart_tcp_client:
#   id: bus_tcpuart
#   host: "192.168.1.23"
#   port: 23
#   rx_buffer_size: 4096
#   reconnect_interval: 5s

# --- TCP serial server (exposes the bus to telnet/bridge clients) ---
#
# uart_tcp_server:
#   id: bus_tcpserver
#   port: 23
#   max_clients: 2
#   client_mode: exclusive

# ──────────────────────────────────────────────
# InfinitESP hub
# ──────────────────────────────────────────────

infinitesp:
  id: infinitesp_hub
  uart_id: bus_uart          # Change to bus_cdcuart or bus_tcpuart for alternatives
  address: 0x92              # 0x92 = SAM, 0x93 = FakeSAM (test mode)
  status_light_id: rgb_led

# ──────────────────────────────────────────────
# Climate zones (uncomment the zones you have)
# ──────────────────────────────────────────────

climate:
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Zone 1 Climate"
    zone: 1
  # - platform: infinitesp
  #   infinitesp_id: infinitesp_hub
  #   name: "Zone 2 Climate"
  #   zone: 2
  # - platform: infinitesp
  #   infinitesp_id: infinitesp_hub
  #   name: "Zone 3 Climate"
  #   zone: 3
  # - platform: infinitesp
  #   infinitesp_id: infinitesp_hub
  #   name: "Zone 4 Climate"
  #   zone: 4
  # - platform: infinitesp
  #   infinitesp_id: infinitesp_hub
  #   name: "Zone 5 Climate"
  #   zone: 5
  # - platform: infinitesp
  #   infinitesp_id: infinitesp_hub
  #   name: "Zone 6 Climate"
  #   zone: 6
  # - platform: infinitesp
  #   infinitesp_id: infinitesp_hub
  #   name: "Zone 7 Climate"
  #   zone: 7
  # - platform: infinitesp
  #   infinitesp_id: infinitesp_hub
  #   name: "Zone 8 Climate"
  #   zone: 8

# ──────────────────────────────────────────────
# Sensors
# ──────────────────────────────────────────────

sensor:
  # Zone environment (add temperature + humidity for each active zone)
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Zone 1 Temperature"
    type: temperature
    zone: 1
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Zone 1 Humidity"
    type: humidity
    zone: 1

  # Outdoor
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Outdoor Temperature"
    type: outdoor_temperature

  # Indoor unit
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Blower RPM"
    type: blower_rpm
    icon: "mdi:fan"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Airflow CFM"
    type: airflow_cfm
    icon: "mdi:air-filter"
    entity_category: diagnostic

  # Outdoor unit — compressor
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Compressor RPM"
    type: compressor_rpm
    icon: "mdi:engine"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Demand"
    type: odu_demand
    icon: "mdi:percent"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Stage"
    type: odu_stage
    icon: "mdi:step-forward"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Modulation"
    type: odu_modulation
    icon: "mdi:tune"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Setpoint"
    type: odu_setpoint
    icon: "mdi:thermometer-check"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Operating Mode"
    type: odu_mode
    icon: "mdi:briefcase-edit"
    entity_category: diagnostic

  # Outdoor unit — superheat / subcooling (float registers)
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Superheat Target"
    type: odu_float_1
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Superheat Actual"
    type: odu_float_2
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Subcooling Target"
    type: odu_float_3
    accuracy_decimals: 1
    icon: "mdi:thermometer-chevron-down"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Subcooling Actual"
    type: odu_float_4
    accuracy_decimals: 1
    icon: "mdi:thermometer-chevron-down"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Float 5"
    type: odu_float_5
    accuracy_decimals: 1
    icon: "mdi:thermometer-alert"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Float 6"
    type: odu_float_6
    accuracy_decimals: 3
    icon: "mdi:blur"
    entity_category: diagnostic

  # Outdoor unit — temperatures
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Outdoor Temp"
    type: odu_outdoor_temp
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Coil Temp"
    type: odu_coil_temp
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Suction Temp"
    type: odu_suction_temp
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Liquid Temp"
    type: odu_liquid_temp
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Indoor Coil Temp"
    type: odu_indoor_coil_temp
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "ODU Discharge Temp"
    type: odu_discharge_temp
    accuracy_decimals: 1
    icon: "mdi:thermometer"
    entity_category: diagnostic

  # Vacation limits
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Vacation Min Temp"
    type: vacation_min_temp
    icon: "mdi:thermometer-low"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Vacation Max Temp"
    type: vacation_max_temp
    icon: "mdi:thermometer-high"
    entity_category: diagnostic

  # Board diagnostics
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

# ──────────────────────────────────────────────
# Binary sensors
# ──────────────────────────────────────────────

binary_sensor:
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Bus Status"
    type: bus_status
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Compressor Running"
    type: compressor_running
    icon: "mdi:engine"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Electric Heat"
    type: electric_heat
    icon: "mdi:fire"
    entity_category: diagnostic
  # Board
  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Boot Button"
    entity_category: diagnostic
  - platform: status
    name: "Status"

# ──────────────────────────────────────────────
# Selects
# ──────────────────────────────────────────────

select:
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "System Mode"
    type: system_mode
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Zone 1 Fan Mode"
    type: fan_mode
    zone: 1

# ──────────────────────────────────────────────
# Text sensors
# ──────────────────────────────────────────────

text_sensor:
  # Zone info (add zone_name for each active zone)
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Zone 1 Name"
    type: zone_name
    zone: 1
  # Thermostat network info
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Thermostat WiFi SSID"
    type: tstat_ssid
    icon: "mdi:wifi"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Thermostat Hostname"
    type: tstat_hostname
    icon: "mdi:network"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Thermostat WiFi MAC"
    type: tstat_wifi_mac
    icon: "mdi:identifier"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Thermostat Cloud Host"
    type: tstat_cloud_host
    icon: "mdi:cloud-outline"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Thermostat Proxy Server"
    type: tstat_proxy_server
    icon: "mdi:ip-network"
    entity_category: diagnostic
  # Thermostat data
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Comfort Profiles"
    type: comfort_profile
    icon: "mdi:thermostat"
    entity_category: diagnostic
  # Dealer info
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Dealer Name"
    type: tstat_dealer_name
    icon: "mdi:account-hard-hat"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Dealer Brand"
    type: tstat_dealer_brand
    icon: "mdi:tag"
    entity_category: diagnostic
  - platform: infinitesp
    infinitesp_id: infinitesp_hub
    name: "Dealer URL"
    type: tstat_dealer_url
    icon: "mdi:web"
    entity_category: diagnostic
  # Board
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic

# ──────────────────────────────────────────────
# Board hardware — Waveshare ESP32-S3-Relay-6CH
# ──────────────────────────────────────────────

switch:
  - platform: gpio
    pin: GPIO1
    id: relay1
    name: "Relay 1"
  - platform: gpio
    pin: GPIO2
    id: relay2
    name: "Relay 2"
  - platform: gpio
    pin: GPIO41
    id: relay3
    name: "Relay 3"
  - platform: gpio
    pin: GPIO42
    id: relay4
    name: "Relay 4"
  - platform: gpio
    pin:
      number: GPIO45
      ignore_strapping_warning: true
    id: relay5
    name: "Relay 5"
  - platform: gpio
    pin:
      number: GPIO46
      ignore_strapping_warning: true
    id: relay6
    name: "Relay 6"

light:
  - platform: esp32_rmt_led_strip
    id: rgb_led
    name: "RGB LED"
    rgb_order: RGB
    pin: GPIO38
    num_leds: 1
    chipset: WS2812

output:
  - platform: ledc
    pin: GPIO21
    id: buzzer

rtttl:
  output: buzzer
  id: rtttl_buzzer
  gain: 30%

button:
  - platform: restart
    name: "Restart"
    entity_category: config
  - platform: safe_mode
    name: "Safe Mode"
    entity_category: config
